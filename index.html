<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Project: Calculator</title>
</head>
<body>
    <main class="calculator">
        <input type="text" placeholder="0" id="display">
        <div>
            <button value="Backspace" class="backBtn">Backspace</button>
            <button value="Delete" class="delBtn">Delete</button>
            <button value="/" class="operator">&divide;</button>
        </div>
        <div>
            <button value="7">7</button>
            <button value="8">8</button>
            <button value="9">9</button>
            <button value="*" class="operator">&times;</button>
        </div>
        <div>
            <button value="4">4</button>
            <button value="5">5</button>
            <button value="6">6</button>
            <button value="-" class="operator">&minus;</button>
        </div>
        <div>
            <button value="1">1</button>
            <button value="2">2</button>
            <button value="3">3</button>
            <button value="+" class="operator">&plus;</button>
        </div>
        <div>
            <button value="0">0</button>
            <button value=".">.</button>
            <button value="=" class="equalBtn">&equals;</button>
        </div>
    </main>
</body>
</html>
