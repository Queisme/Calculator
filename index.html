<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Project: Calculator</title>
</head>
<body>
    <main class="calculator">
        <input type="text" placeholder="0" id="display">
        <div>
            <button class="backBtn">Backspace</button>
            <button class="delBtn">Delete</button>
            <button class="operator">÷</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">x</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>
        <div>
            <button>0</button>
            <button>.</button>
            <button class="equalBtn">=</button>
        </div>
    </main>
</body>
</html>
